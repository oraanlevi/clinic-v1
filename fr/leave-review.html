<body class="review-form-page">
  <div id="site-header"></div>

  <section class="hero">
    <div class="container">
      <h1>Laisser un avis</h1>
      <p>Votre retour aide les futurs patients. Les avis sont moderes avant publication.</p>
    </div>
  </section>

  <section class="home-section review-form-wrap">
    <div class="container">
      <form id="review-form" class="review-form" novalidate>
        <div class="review-form-grid">
          <label>Prenom
            <input type="text" name="first_name" autocomplete="given-name" required>
          </label>
          <label>Initiale du nom
            <input type="text" name="last_initial" maxlength="1" required>
          </label>
          <label>Ville
            <input type="text" name="city" autocomplete="address-level2" required>
          </label>
          <label>Langue
            <select name="language" required>
              <option value="fr">Francais</option>
              <option value="en">English</option>
              <option value="it">Italiano</option>
              <option value="es">Espanol</option>
            </select>
          </label>
          <label class="review-rating">Note (etoiles)
            <input type="hidden" name="rating" value="5" required>
            <div class="rating-stars" aria-label="Selectionnez une note de 1 a 5 etoiles">
              <button type="button" class="star-btn active" data-value="1" aria-label="1 etoile" aria-pressed="true">★</button>
              <button type="button" class="star-btn active" data-value="2" aria-label="2 etoiles" aria-pressed="true">★</button>
              <button type="button" class="star-btn active" data-value="3" aria-label="3 etoiles" aria-pressed="true">★</button>
              <button type="button" class="star-btn active" data-value="4" aria-label="4 etoiles" aria-pressed="true">★</button>
              <button type="button" class="star-btn active" data-value="5" aria-label="5 etoiles" aria-pressed="true">★</button>
            </div>
          </label>
          <label>Type de service (optionnel)
            <input type="text" name="service_type" maxlength="80">
          </label>
        </div>

        <label>Message de l avis
          <textarea name="message" rows="6" required></textarea>
        </label>

        <label class="review-consent">
          <input type="checkbox" name="consent" required>
          <span>Je confirme que cet avis reflete une experience reelle.</span>
        </label>

        <p id="review-form-status" class="review-form-status" aria-live="polite"></p>

        <div class="review-actions">
          <button type="submit" class="btn primary-button review-action-btn">Envoyer l avis</button>
          <a href="index.html#reviews" class="review-back-link">Retour aux avis</a>
        </div>
      </form>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="../reviews-config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
